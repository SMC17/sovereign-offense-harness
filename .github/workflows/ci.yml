name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: zig build
        run: zig build

      - name: zig build test
        run: zig build test

      - name: Validate the example TTPs parse cleanly
        run: |
          for f in ttps/examples/*.json; do
            ./zig-out/bin/sovereign-offense-harness validate "$f"
          done

      - name: Smoke run a safe TTP
        run: |
          # --unsafe-local is the explicit safety acknowledgement that
          # the v0.2 gate requires: this is an ephemeral CI runner, the
          # example TTP is read-only (T1082 system-info discovery), and
          # we accept that `exec` runs as the runner's user.
          ./zig-out/bin/sovereign-offense-harness run \
            --unsafe-local \
            --ttp ttps/examples/t1082-system-information-discovery.json \
            --out /tmp/envelopes
          ls /tmp/envelopes/

      - name: Envelope is valid JSON
        run: |
          for f in /tmp/envelopes/*.json; do
            python3 -m json.tool "$f" > /dev/null
          done
